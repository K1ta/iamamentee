apiVersion: batch/v1
kind: Job
metadata:
  name: shards-migration
  namespace: product-management
spec:
  backoffLimit: 3
  template:
    spec:
      containers:
        - name: products
          image: docker.io/library/product-management:latest
          imagePullPolicy: Never
          command: ["./product-management", "migrate-shards"]
          env:
            - name: MIGRATOR_DB_CONNECTIONS
              value: "postgres-0>postgresql://admin:password@postgres-0.postgres.product-management-infra:5432/product-management?sslmode=disable,postgres-1>postgresql://admin:password@postgres-1.postgres.product-management-infra:5432/product-management?sslmode=disable"
            - name: MIGRATOR_SHARDS
              value: "products-0:postgres-0,products-1:postgres-1"
            - name: MIGRATOR_PREV_SHARDS
              value: "products-0:postgres-0"
            - name: MIGRATOR_PREV_SHARDS_START_FROM
              value: ""
            - name: MIGRATOR_BATCH_LIMIT
              value: "1"
      restartPolicy: Never
