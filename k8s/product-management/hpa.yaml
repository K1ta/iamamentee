apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-management
  namespace: product-management
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-management
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
