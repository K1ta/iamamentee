apiVersion: apps/v1
kind: Deployment
metadata:
  name: products
  namespace: products
spec:
  replicas: 3
  selector:
    matchLabels:
      app: products
  template:
    metadata:
      labels:
        app: products
        app.kubernetes.io/part-of: mentee
    spec:
      containers:
        - name: products
          image: docker.io/library/products:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: products-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
